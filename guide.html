<body class="guide-body">

    <section class="guide-card">
      <h1>面试指引说明</h1>
      <p>这是一个纯前端静态演示页面，适合直接部署到 GitHub Pages、Nginx、Apache 或宝塔站点目录。</p>
      <ul>
        <li>登录页仅校验固定验证码 <strong>uhXu</strong>。</li>
        <li>姓名和准考证号不会做后端验证，仅用于结果页展示。</li>
        <li>英语、数学、面试成绩、入围面试与录取结果均为前端随机生成。</li>
        <li>如果没有入围面试，录取结果会固定显示为 <strong>未录取</strong>。</li>
        <li>备注老师会从预设老师名单中随机抽取两位，并在后方附带“点击查看面试指南”入口。</li>
      </ul>
      <div class="guide-actions">
        <a class="download-btn" href="assets/admission-letter.txt" download>下载录取通知书</a>
        <a class="secondary-btn" href="result.html">返回结果页</a>
        <a class="ghost-btn" href="index.html">返回登录页</a>
      </div>
    </section>
  </main>
